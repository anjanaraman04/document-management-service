{% extends "base.html" %}

{% block title %}Search — {{ document.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <div class="mb-6">
    <a href="/documents/{{ document.pk }}/" class="text-sm text-indigo-600 hover:underline">← {{ document.title }}</a>
    <h1 class="text-2xl font-bold text-gray-800 mt-2">Search Within Document</h1>
  </div>

  <!-- Search input -->
  <div class="flex gap-3 mb-6">
    <input
      id="query"
      type="text"
      placeholder="Enter search term..."
      class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
    />
    <button
      id="search-btn"
      class="bg-indigo-600 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-indigo-700 transition-colors"
    >
      Search
    </button>
  </div>

  <!-- Results -->
  <div id="results"></div>

</div>

<script>
  const docId = {{ document.pk }};

  async function doSearch() {
    const query = document.getElementById('query').value.trim();
    const results = document.getElementById('results');

    if (!query) {
      results.innerHTML = '';
      return;
    }

    const response = await fetch(`/api/documents/${docId}/search/?q=${encodeURIComponent(query)}`);
    const data = await response.json();

    if (response.status === 400) {
      results.innerHTML = `
        <div class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
          ${data.error}
        </div>`;
      return;
    }

    if (response.status === 404) {
      results.innerHTML = `
        <div class="text-sm text-gray-500 bg-gray-50 border border-gray-200 rounded-lg px-4 py-3">
          No match found for <span class="font-medium text-gray-700">"${query}"</span>.
        </div>`;
      return;
    }

    // Highlight matched term in snippet
    const highlighted = data.snippet
      .replace(/>>>/g, '<mark class="bg-yellow-200 text-yellow-900 rounded px-0.5">')
      .replace(/<<</g, '</mark>');

    results.innerHTML = `
      <div class="bg-white border border-gray-200 rounded-xl p-5">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Match found</p>
        <p class="text-sm text-gray-700 leading-relaxed">${highlighted}</p>
      </div>`;
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);

  document.getElementById('query').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });
</script>
{% endblock %}
