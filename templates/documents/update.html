{% extends "base.html" %}

{% block title %}Edit — {{ document.title }}{% endblock %}

{% block content %}
<div class="flex gap-6 items-start" data-doc-id="{{ document.pk }}">

  <!-- Left panel -->
  <div class="w-80 shrink-0">
    <div class="bg-white border border-gray-200 rounded-xl p-5 sticky top-6">
      <a href="/documents/{{ document.pk }}/" class="text-xs text-indigo-600 hover:underline">← {{ document.title }}</a>

      <!-- Mode toggle -->
      <div class="flex gap-1 mt-3 mb-4 bg-gray-100 rounded-lg p-1">
        <button id="btn-find-replace" onclick="showPanel('find-replace')"
          class="flex-1 text-xs font-medium px-2 py-1.5 rounded-md bg-white text-gray-800 shadow-sm transition-all">
          Find &amp; Replace
        </button>
        <button id="btn-semantic" onclick="showPanel('semantic')"
          class="flex-1 text-xs font-medium px-2 py-1.5 rounded-md text-gray-500 transition-all hover:text-gray-700">
          Semantic
        </button>
      </div>

      <!-- Find & Replace panel -->
      <div id="panel-find-replace">
        <!-- Search input -->
        <div class="mb-3">
          <label class="block text-xs font-medium text-gray-500 mb-1">Find</label>
          <div class="flex gap-2">
            <input id="search-input" type="text" placeholder="Search..."
              class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
            <button id="search-btn"
              class="bg-indigo-600 text-white text-xs font-medium px-3 py-2 rounded-lg hover:bg-indigo-700 transition-colors">
              Find
            </button>
          </div>
        </div>

        <!-- Match count -->
        <p id="match-count" class="text-xs text-gray-400 mb-3 hidden"></p>

        <!-- Match list -->
        <div id="match-list" class="space-y-1 mb-4 max-h-52 overflow-y-auto"></div>

        <!-- Replace input (shown after selecting a match) -->
        <div id="replace-section" class="hidden border-t border-gray-100 pt-4">
          <label class="block text-xs font-medium text-gray-500 mb-1">Replace with</label>
          <input id="replace-input" type="text" placeholder="Replacement..."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-3" />
          <div class="flex gap-2">
            <button id="replace-btn"
              class="flex-1 bg-indigo-600 text-white text-xs font-medium px-3 py-2 rounded-lg hover:bg-indigo-700 transition-colors">
              Replace
            </button>
            <button id="cancel-btn" onclick="cancelSelection()"
              class="flex-1 border border-gray-300 text-gray-600 text-xs font-medium px-3 py-2 rounded-lg hover:bg-gray-50 transition-colors">
              Cancel
            </button>
          </div>
        </div>

        <!-- Error / success messages -->
        <div id="error-msg" class="hidden mt-3 text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <div id="success-msg" class="hidden mt-3 text-xs text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2"></div>
      </div>

      <!-- Semantic search panel -->
      <div id="panel-semantic" class="hidden">
        <div class="flex gap-2 mb-2">
          <input id="semantic-input" type="text" placeholder="Describe what you're looking for..."
            class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <button id="semantic-btn"
            class="bg-indigo-600 text-white text-xs font-medium px-3 py-2 rounded-lg hover:bg-indigo-700 transition-colors">
            Go
          </button>
        </div>
        <p class="text-xs text-gray-400 mb-3">Finds passages by meaning, not exact words.</p>
        <div id="semantic-loading" class="hidden text-xs text-gray-400 mb-2">Analyzing document...</div>
        <div id="semantic-results" class="space-y-2 max-h-96 overflow-y-auto"></div>
      </div>

    </div>
  </div>

  <!-- Right panel: Document content -->
  <div class="flex-1 min-w-0">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-xl font-bold text-gray-800">{{ document.title }}</h1>
      <span id="version-badge" class="text-xs font-medium bg-indigo-50 text-indigo-600 px-2 py-1 rounded-full">v{{ document.version }}</span>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl p-6">
      <div id="doc-content" class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{{ document.content }}</div>
    </div>
  </div>

</div>

<script>
  const docId = {{ document.pk }};
  let allMatches = [];
  let selectedOccurrence = null;

  const searchInput = document.getElementById('search-input');
  const replaceInput = document.getElementById('replace-input');
  const matchList = document.getElementById('match-list');
  const matchCount = document.getElementById('match-count');
  const replaceSection = document.getElementById('replace-section');
  const errorMsg = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');
  const docContent = document.getElementById('doc-content');

  async function doSearch() {
    const query = searchInput.value.trim();
    clearMessages();
    resetSelection();
    matchList.innerHTML = '';
    matchCount.classList.add('hidden');

    if (!query) return;

    const response = await fetch(`/api/documents/${docId}/search/?q=${encodeURIComponent(query)}`);
    const data = await response.json();

    if (!response.ok) {
      showError(data.error || 'No matches found.');
      highlightDoc(docContent.textContent, query, []);
      return;
    }

    allMatches = data.matches;
    matchCount.textContent = `${data.total} match${data.total !== 1 ? 'es' : ''} found`;
    matchCount.classList.remove('hidden');

    highlightDoc(docContent.textContent, query, allMatches);
    renderMatchList(allMatches, query);
  }

  function renderMatchList(matches, query) {
    matchList.innerHTML = '';
    matches.forEach(m => {
      const highlighted = m.snippet
        .replace(/>>>/g, '<mark class="bg-yellow-200 text-yellow-900 rounded px-0.5">')
        .replace(/<<</g, '</mark>');
      const btn = document.createElement('button');
      btn.className = 'w-full text-left px-3 py-2 rounded-lg border border-gray-200 text-xs text-gray-600 hover:border-indigo-400 hover:bg-indigo-50 transition-colors';
      btn.innerHTML = `<span class="text-gray-400 mr-1">#${m.occurrence + 1}</span>${highlighted}`;
      btn.onclick = () => selectMatch(m);
      btn.id = `match-btn-${m.occurrence}`;
      matchList.appendChild(btn);
    });
  }

  function selectMatch(match) {
    selectedOccurrence = match.occurrence;

    // Highlight selected match card
    allMatches.forEach(m => {
      const btn = document.getElementById(`match-btn-${m.occurrence}`);
      if (btn) btn.className = m.occurrence === selectedOccurrence
        ? 'w-full text-left px-3 py-2 rounded-lg border border-indigo-400 bg-indigo-50 text-xs text-gray-600 transition-colors'
        : 'w-full text-left px-3 py-2 rounded-lg border border-gray-200 text-xs text-gray-600 hover:border-indigo-400 hover:bg-indigo-50 transition-colors';
    });

    replaceSection.classList.remove('hidden');
    replaceInput.focus();
  }

  function cancelSelection() {
    resetSelection();
  }

  function resetSelection() {
    selectedOccurrence = null;
    replaceSection.classList.add('hidden');
    replaceInput.value = '';
    allMatches.forEach(m => {
      const btn = document.getElementById(`match-btn-${m.occurrence}`);
      if (btn) btn.className = 'w-full text-left px-3 py-2 rounded-lg border border-gray-200 text-xs text-gray-600 hover:border-indigo-400 hover:bg-indigo-50 transition-colors';
    });
  }

  async function doReplace() {
    const query = searchInput.value.trim();
    const replacement = replaceInput.value;
    clearMessages();

    if (selectedOccurrence === null || !query) return;

    const response = await fetch(`/api/documents/${docId}/replace-text/`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        changes: [{ search: query, replacement, occurrence: selectedOccurrence }]
      }),
    });

    const data = await response.json();

    if (!response.ok) {
      showError(data.error || 'Something went wrong.');
      return;
    }

    // Update doc content and version
    docContent.textContent = data.content;
    document.getElementById('version-badge').textContent = `v${data.version}`;

    showSuccess(`Occurrence #${selectedOccurrence + 1} replaced.`);
    resetSelection();

    // Re-run search to refresh match list
    await doSearch();
  }

  function highlightDoc(content, query, matches) {
    if (!matches.length) {
      docContent.textContent = content;
      return;
    }
    const sorted = [...matches].sort((a, b) => a.position - b.position);
    let html = '';
    let cursor = 0;
    sorted.forEach(m => {
      html += escapeHtml(content.slice(cursor, m.position));
      html += `<mark class="bg-yellow-200 text-yellow-900 rounded px-0.5">${escapeHtml(m.match_text)}</mark>`;
      cursor = m.position + m.match_text.length;
    });
    html += escapeHtml(content.slice(cursor));
    docContent.innerHTML = html;
  }

  function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.remove('hidden'); }
  function showSuccess(msg) { successMsg.textContent = msg; successMsg.classList.remove('hidden'); }
  function clearMessages() { errorMsg.classList.add('hidden'); successMsg.classList.add('hidden'); }

  function escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('replace-btn').addEventListener('click', doReplace);
  searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  replaceInput.addEventListener('keydown', e => { if (e.key === 'Enter') doReplace(); });

  const prefilledQuery = new URLSearchParams(window.location.search).get('q');
  if (prefilledQuery) {
    searchInput.value = prefilledQuery;
    doSearch();
  }

  function showPanel(panel) {
    const isFindReplace = panel === 'find-replace';
    document.getElementById('panel-find-replace').classList.toggle('hidden', !isFindReplace);
    document.getElementById('panel-semantic').classList.toggle('hidden', isFindReplace);
    const activeClass = 'flex-1 text-xs font-medium px-2 py-1.5 rounded-md bg-white text-gray-800 shadow-sm transition-all';
    const inactiveClass = 'flex-1 text-xs font-medium px-2 py-1.5 rounded-md text-gray-500 transition-all hover:text-gray-700';
    document.getElementById('btn-find-replace').className = isFindReplace ? activeClass : inactiveClass;
    document.getElementById('btn-semantic').className = isFindReplace ? inactiveClass : activeClass;
  }

  async function doSemanticSearch() {
    const query = document.getElementById('semantic-input').value.trim();
    if (!query) return;
    const loading = document.getElementById('semantic-loading');
    const results = document.getElementById('semantic-results');
    results.innerHTML = '';
    loading.classList.remove('hidden');
    const response = await fetch(`/api/documents/${docId}/semantic-search/?q=${encodeURIComponent(query)}`);
    const data = await response.json();
    loading.classList.add('hidden');
    if (!response.ok) {
      results.innerHTML = `<p class="text-xs text-red-600">${escapeHtml(data.error || 'Search failed.')}</p>`;
      return;
    }
    data.results.forEach(r => {
      const scorePercent = Math.round(r.score * 100);
      const card = document.createElement('div');
      card.className = 'border border-gray-200 rounded-lg px-3 py-2';
      card.innerHTML = `
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs text-gray-400">#${r.rank}</span>
          <span class="text-xs font-medium px-1.5 py-0.5 rounded-full ${scorePercent >= 60 ? 'bg-indigo-50 text-indigo-600' : 'bg-gray-100 text-gray-500'}">${scorePercent}%</span>
        </div>
        <p class="text-xs text-gray-700 leading-relaxed">${escapeHtml(r.text)}</p>
      `;
      results.appendChild(card);
    });
  }

  document.getElementById('semantic-btn').addEventListener('click', doSemanticSearch);
  document.getElementById('semantic-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSemanticSearch(); });
</script>
{% endblock %}
