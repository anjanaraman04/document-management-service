{% extends "base.html" %}

{% block title %}Edit — {{ document.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <div class="mb-6">
    <a href="/documents/{{ document.pk }}/" class="text-sm text-indigo-600 hover:underline">← {{ document.title }}</a>
    <h1 class="text-2xl font-bold text-gray-800 mt-2">Edit Document</h1>
  </div>

  <!-- Current content preview -->
  <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-6">
    <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Current Content</p>
    <p id="current-content" class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{{ document.content }}</p>
  </div>

  <!-- Changes form -->
  <div class="bg-white border border-gray-200 rounded-xl p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold text-gray-700">Text Replacements</h2>
      <button
        type="button"
        id="add-row"
        class="text-xs font-medium text-indigo-600 hover:text-indigo-800 transition-colors"
      >
        + Add Row
      </button>
    </div>

    <!-- Header row -->
    <div class="grid grid-cols-2 gap-3 mb-2 px-1">
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Search</span>
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Replacement</span>
    </div>

    <!-- Change rows -->
    <div id="changes-list" class="space-y-2"></div>

    <!-- Error / warning messages -->
    <div id="error-msg" class="hidden mt-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3"></div>
    <div id="warnings-box" class="hidden mt-4 space-y-1"></div>

    <div class="flex gap-3 mt-5">
      <button
        id="submit-btn"
        class="bg-indigo-600 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-indigo-700 transition-colors"
      >
        Apply Changes
      </button>
      <a href="/documents/{{ document.pk }}/" class="text-sm font-medium text-gray-500 px-5 py-2 rounded-lg hover:bg-gray-100 transition-colors">
        Cancel
      </a>
    </div>
  </div>

</div>

<script>
  const docId = {{ document.pk }};
  const changesList = document.getElementById('changes-list');
  const errorMsg = document.getElementById('error-msg');
  const warningsBox = document.getElementById('warnings-box');

  function addRow(search = '', replacement = '') {
    const row = document.createElement('div');
    row.className = 'grid grid-cols-2 gap-3 items-center group';
    row.innerHTML = `
      <input
        type="text"
        placeholder="Text to find"
        value="${search}"
        class="search-input border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
      />
      <div class="flex gap-2 items-center">
        <input
          type="text"
          placeholder="Replace with"
          value="${replacement}"
          class="replacement-input flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
        <button type="button" class="remove-row text-gray-300 hover:text-red-400 transition-colors text-lg leading-none">×</button>
      </div>
    `;
    row.querySelector('.remove-row').addEventListener('click', () => row.remove());
    changesList.appendChild(row);
  }

  // Start with one empty row
  addRow();

  document.getElementById('add-row').addEventListener('click', () => addRow());

  document.getElementById('submit-btn').addEventListener('click', async () => {
    errorMsg.classList.add('hidden');
    warningsBox.classList.add('hidden');
    warningsBox.innerHTML = '';

    const rows = changesList.querySelectorAll('.group');
    const changes = Array.from(rows).map(row => ({
      search: row.querySelector('.search-input').value,
      replacement: row.querySelector('.replacement-input').value,
    })).filter(c => c.search.trim() !== '');

    if (changes.length === 0) {
      errorMsg.textContent = 'Add at least one replacement row.';
      errorMsg.classList.remove('hidden');
      return;
    }

    const response = await fetch(`/api/documents/${docId}/replace-text/`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({changes}),
    });

    const data = await response.json();

    if (!response.ok) {
      errorMsg.textContent = data.error || 'Something went wrong.';
      errorMsg.classList.remove('hidden');
      return;
    }

    // Update the content preview
    document.getElementById('current-content').textContent = data.content;

    // Show any warnings
    if (data.warnings && data.warnings.length > 0) {
      data.warnings.forEach(w => {
        const el = document.createElement('p');
        el.className = 'text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-4 py-2';
        el.textContent = '⚠ ' + w;
        warningsBox.appendChild(el);
      });
      warningsBox.classList.remove('hidden');
    }

    // Clear rows and add a fresh one
    changesList.innerHTML = '';
    addRow();
  });
</script>
{% endblock %}
