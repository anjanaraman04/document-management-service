{% extends "base.html" %}

{% block title %}Search All Documents{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <h1 class="text-2xl font-bold text-gray-800 mb-8">Search All Documents</h1>

  <!-- Search input -->
  <div class="flex gap-3 mb-8">
    <input
      id="query"
      type="text"
      placeholder="Enter search term..."
      class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
    />
    <button
      id="search-btn"
      class="bg-indigo-600 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-indigo-700 transition-colors"
    >
      Search
    </button>
  </div>

  <!-- Results -->
  <div id="results"></div>

</div>

<script>
  async function doSearch() {
    const query = document.getElementById('query').value.trim();
    const results = document.getElementById('results');

    if (!query) {
      results.innerHTML = '';
      return;
    }

    results.innerHTML = `<p class="text-sm text-gray-400">Searching...</p>`;

    const response = await fetch(`/api/documents/search/?q=${encodeURIComponent(query)}`);
    const data = await response.json();

    if (response.status === 400) {
      results.innerHTML = `
        <div class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
          ${data.error}
        </div>`;
      return;
    }

    if (response.status === 404) {
      results.innerHTML = `
        <div class="text-sm text-gray-500 bg-gray-50 border border-gray-200 rounded-lg px-4 py-3">
          No matches found for <span class="font-medium text-gray-700">"${query}"</span> across any document.
        </div>`;
      return;
    }

    const count = data.results.length;
    const plural = count === 1 ? 'document' : 'documents';

    const cards = data.results.map(r => {
      const highlighted = r.snippet
        .replace(/>>>/g, '<mark class="bg-yellow-200 text-yellow-900 rounded px-0.5">')
        .replace(/<<</g, '</mark>');
      return `
        <div class="bg-white border border-gray-200 rounded-xl p-5 hover:shadow-md hover:border-indigo-300 transition-all">
          <div class="flex items-center justify-between mb-2">
            <a href="/documents/${r.id}/" class="text-xs font-medium text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full hover:underline">Document #${r.id}</a>
            <a href="/documents/${r.id}/edit/?q=${encodeURIComponent(query)}"
              class="text-xs font-medium text-gray-600 border border-gray-300 px-3 py-1 rounded-lg hover:bg-gray-50 transition-colors">
              Jump to Edit
            </a>
          </div>
          <p class="text-sm text-gray-700 leading-relaxed">${highlighted}</p>
        </div>`;
    }).join('');

    results.innerHTML = `
      <p class="text-xs text-gray-400 uppercase tracking-wide font-medium mb-3">${count} ${plural} matched</p>
      <div class="grid gap-3">${cards}</div>`;
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);

  document.getElementById('query').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });
</script>
{% endblock %}
