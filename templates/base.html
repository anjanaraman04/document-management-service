<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Document App{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-semibold tracking-tight text-indigo-600">DocApp</a>
      <div class="flex gap-6 text-sm font-medium text-gray-600">
        <a href="/" class="hover:text-indigo-600 transition-colors">Home</a>
        <a href="/new/" class="hover:text-indigo-600 transition-colors">New Document</a>
        <a href="/search/" class="hover:text-indigo-600 transition-colors">Search</a>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main class="max-w-5xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
